name: CF Purge Cache (APPAA-42)

# One-shot maintenance workflow: purge the Cloudflare edge cache for
# 399apps.com after the APPAA-42 product removal. Two now-deleted URLs
# (/apps/matrimonials/ and /apps/jobportal/) were still served as stale
# cached 200s (cache-control: s-maxage=604800) even though they no longer
# exist in the deployment. purge_everything flushes them and any other
# stale HTML so the live site reflects the current build.
# Uses the existing CLOUDFLARE_API_TOKEN repo secret (same one the deploy
# workflow uses). If that token lacks Zone:Cache Purge the API call fails
# with a permissions error that this log surfaces explicitly.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  purge:
    name: Purge Cloudflare cache
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: purge_everything for 399apps.com
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4"

          echo "::group::Resolve zone id"
          ZRESP=$(curl -s -X GET "$api/zones?name=399apps.com" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json")
          echo "zone lookup success: $(echo "$ZRESP" | jq -r '.success')"
          ZONE_ID=$(echo "$ZRESP" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "::error::Could not resolve zone id for 399apps.com (token likely lacks Zone:Read)."
            echo "$ZRESP" | jq '{success, errors, messages}'
            exit 1
          fi
          echo "zone id resolved (len ${#ZONE_ID})"
          echo "::endgroup::"

          echo "::group::Purge everything"
          PRESP=$(curl -s -X POST "$api/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          OK=$(echo "$PRESP" | jq -r '.success')
          echo "purge success: $OK"
          echo "$PRESP" | jq '{success, result:{id:.result.id}, errors, messages}'
          if [ "$OK" != "true" ]; then
            echo "::error::purge_cache failed — token likely lacks 'Zone: Cache Purge'. See errors above."
            exit 1
          fi
          echo "::endgroup::"

          echo "Cloudflare cache purged for 399apps.com."
